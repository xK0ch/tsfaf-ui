@if (loading()) {
  <section class="detail-section">
    <div class="container">
      <p class="news-status" role="status">Beitrag wird geladen…</p>
    </div>
  </section>
} @else if (article(); as a) {
  <!-- ─── PAGE HERO ───────────────────────────────────────────────── -->
  <header class="page-hero">
    <div class="page-hero-bg" aria-hidden="true">
      <svg viewBox="0 0 1200 200" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
        <defs>
          <radialGradient id="news-detail-grad-1" cx="8%" cy="55%" r="50%">
            <stop offset="0%"   stop-color="#DC8C50" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#DC8C50" stop-opacity="0" />
          </radialGradient>
          <radialGradient id="news-detail-grad-2" cx="92%" cy="40%" r="48%">
            <stop offset="0%"   stop-color="#64B4C8" stop-opacity="0.07" />
            <stop offset="100%" stop-color="#64B4C8" stop-opacity="0" />
          </radialGradient>
        </defs>
        <rect width="1200" height="200" fill="white" />
        <rect width="1200" height="200" fill="url(#news-detail-grad-1)" />
        <rect width="1200" height="200" fill="url(#news-detail-grad-2)" />
      </svg>
    </div>
    <div class="container page-hero-inner">
      <p class="page-eyebrow">Neuigkeiten</p>
      <nav class="breadcrumb" aria-label="Pfadnavigation">
        <a routerLink="/neuigkeiten" class="breadcrumb-link">Neuigkeiten</a>
        <span aria-hidden="true">›</span>
        <span class="breadcrumb-current">{{ a.title }}</span>
      </nav>
    </div>
  </header>

  <!-- ─── DETAIL ──────────────────────────────────────────────────── -->
  <section class="detail-section">
    <div class="container">
      <div class="detail-layout">
        <article class="detail-article">
          <a routerLink="/neuigkeiten" class="detail-back">
            <span aria-hidden="true">←</span> Alle Neuigkeiten
          </a>

          <p class="detail-date">{{ a.dateLong }}</p>
          <h1 class="detail-title">{{ a.title }}</h1>

          @if (a.imageUrl) {
            <figure class="detail-cover">
              <div class="detail-cover-inner">
                <img
                  [src]="a.imageUrl"
                  [alt]="a.imageAlt"
                  loading="eager"
                  decoding="async"
                  class="detail-cover-image"
                />
              </div>
              @if (a.imageCaption) {
                <figcaption class="detail-cover-caption">{{ a.imageCaption }}</figcaption>
              }
            </figure>
          } @else {
            <div class="detail-cover">
              <div class="detail-cover-inner">
                <app-news-cover [id]="a.id" />
              </div>
            </div>
          }

          <div class="detail-body" [innerHTML]="a.bodyHtml"></div>

          <footer class="detail-footer">
            <a routerLink="/neuigkeiten" class="detail-back">
              <span aria-hidden="true">←</span> Zurück zur Übersicht
            </a>
            <div class="detail-share">
              <button type="button" class="share-btn" (click)="copyLink()">
                @if (copied()) {
                  <span aria-hidden="true">✓</span> Kopiert!
                } @else {
                  <span aria-hidden="true">🔗</span> Link teilen
                }
              </button>
              <a [href]="whatsappUrl()" target="_blank" rel="noopener" class="share-btn">
                <span aria-hidden="true">💬</span> WhatsApp
              </a>
            </div>
          </footer>
        </article>

        <app-news-sidebar [currentSlug]="a.slug" />
      </div>
    </div>
  </section>
}
